<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Loan Manager</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h3>Admin Panel</h3>
    <a href="#" id="nav-branches" onclick="show('branches')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Branches
    </a>
    <a href="#" id="nav-borrowers" onclick="show('borrowers')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Borrowers
    </a>
    <a href="#" id="nav-staff" onclick="show('staff')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Staff
    </a>
    <a href="#" id="nav-admins" onclick="show('admins')">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Admins
    </a>
    <a href="#" id="nav-audit" onclick="show('audit')">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>Audit Log
    </a>
    <button class="logout" onclick="logout()">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;vertical-align:middle;margin-right:5px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout
    </button>
  </div>
  <div class="content">

    <!-- Branches -->
    <div id="sec-branches" class="section" style="display:none">
      <div class="section-header">
        <h2>Branches</h2>
        <button class="btn-add" onclick="openAddBranch()">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Branch
        </button>
      </div>
      <div id="branches-table"></div>
    </div>

    <!-- Borrowers -->
    <div id="sec-borrowers" class="section" style="display:none">
      <div class="section-header">
        <h2>Borrowers</h2>
        <button class="btn-add" onclick="openAddBorrower()">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Borrower
        </button>
      </div>
      <div id="borrowers-table"></div>
    </div>

    <!-- Staff -->
    <div id="sec-staff" class="section" style="display:none">
      <div class="section-header">
        <h2>Staff</h2>
        <button class="btn-add" onclick="openAddStaff()">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Staff Member
        </button>
      </div>
      <div id="staff-table"></div>
    </div>

    <!-- Admins -->
    <div id="sec-admins" class="section" style="display:none">
      <div class="section-header">
        <h2>Admins</h2>
        <button class="btn-add" onclick="openAddAdmin()">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Admin
        </button>
      </div>
      <div id="admins-table"></div>
    </div>

    <!-- Audit Log -->
    <div id="sec-audit" class="section" style="display:none">
      <h2>Audit Log</h2>
      <p class="section-meta">Most recent 300 events — all create, update and delete actions across branches, users and loans are logged here.</p>
      <div id="audit-table"></div>
    </div>

  </div>
</div>

<!-- Shared Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body" class="modal-body"></div>
    <div class="msg" id="modal-msg" style="display:none"></div>
    <div class="modal-footer">
      <button class="modal-save" onclick="modalSave()">Save</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
<script>
let _branches = [], _borrowers = [], _staff = [], _admins = [];
let _modalCallback = null;

function show(section) {
  document.querySelectorAll(".section").forEach(s => s.style.display = "none");
  document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active"));
  document.getElementById("sec-" + section).style.display = "block";
  const nav = document.getElementById("nav-" + section);
  if (nav) nav.classList.add("active");
  if (section === "branches")  loadBranches();
  if (section === "borrowers") loadBorrowers();
  if (section === "staff")     loadStaff();
  if (section === "admins")    loadAdmins();
  if (section === "audit")     loadAuditLog();
}

/* ── Modal core ────────────────────────────────────── */
function openModal(title, bodyHTML, onSave) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = bodyHTML;
  document.getElementById("modal-msg").style.display = "none";
  document.getElementById("modal-overlay").style.display = "flex";
  _modalCallback = onSave;
}
function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
  _modalCallback = null;
}
async function modalSave() { if (_modalCallback) await _modalCallback(); }
function modalMsg(text, isError = false) {
  const el = document.getElementById("modal-msg");
  el.textContent = text;
  el.style.display = "inline-block";
  el.style.background = isError ? "#ffebee" : "#e8f5e9";
  el.style.color      = isError ? "#c62828" : "#2e7d32";
}

/* ── Branch select helper ──────────────────────────── */
function branchOptions(selectedId = null) {
  return _branches.map(b =>
    `<option value="${b.branch_id}" ${selectedId == b.branch_id ? "selected" : ""}>${b.branch_name}</option>`
  ).join("");
}

/* ── Branches ──────────────────────────────────────── */
async function loadBranches() {
  _branches = await (await apiFetch("/admin/branches")).json();
  renderTable("branches-table", _branches, [
    { key: "branch_name", label: "Branch Name" },
    { key: "location",    label: "Location" },
    { label: "Actions", render: r => `
      <button class="btn btn-edit" onclick="openEditBranch(${r.branch_id})">Edit</button>
      <button class="btn btn-red"  onclick="delBranch(${r.branch_id})">Delete</button>
    `}
  ]);
}

function branchForm(b = {}) {
  return `
    <label>Branch Name</label>
    <input id="m-b-name" type="text" value="${b.branch_name || ""}" placeholder="e.g. Downtown Branch">
    <label>Location</label>
    <input id="m-b-loc" type="text" value="${b.location || ""}" placeholder="e.g. New York">
  `;
}
function openAddBranch()     { openModal("New Branch",   branchForm(),  () => saveBranch(null)); }
function openEditBranch(id)  {
  const b = _branches.find(x => x.branch_id == id);
  openModal("Edit Branch", branchForm(b), () => saveBranch(id));
}
async function saveBranch(id) {
  const name = document.getElementById("m-b-name").value.trim();
  const loc  = document.getElementById("m-b-loc").value.trim();
  if (!name || !loc) { modalMsg("Both fields are required.", true); return; }
  const res = await apiFetch(id ? `/admin/branches/${id}` : "/admin/branches", {
    method: id ? "PUT" : "POST", headers: authHeaders(),
    body: JSON.stringify({ branch_name: name, location: loc })
  });
  if (res.ok) { closeModal(); loadBranches(); }
  else { modalMsg((await res.json()).detail || "Failed.", true); }
}
async function delBranch(id) {
  if (!confirm("Delete this branch? This cannot be undone.")) return;
  await apiFetch("/admin/branches/" + id, { method: "DELETE", headers: authHeaders() });
  loadBranches();
}

/* ── Borrowers ─────────────────────────────────────── */
async function loadBorrowers() {
  if (!_branches.length) _branches = await (await apiFetch("/admin/branches")).json();
  _borrowers = await (await apiFetch("/admin/borrowers")).json();
  renderTable("borrowers-table", _borrowers, [
    { key: "name",        label: "Name" },
    { key: "username",    label: "Username" },
    { key: "phone",       label: "Phone" },
    { key: "email",       label: "Email" },
    { key: "branch_name", label: "Branch" },
    { label: "Actions", render: r => `
      <button class="btn btn-edit" onclick="openEditBorrower(${r.borrower_id})">Edit</button>
      <button class="btn btn-red"  onclick="delBorrower(${r.borrower_id})">Delete</button>
    `}
  ]);
}

function borrowerForm(b = {}, isEdit = false) {
  return `
    ${!isEdit ? `
    <div class="mrow">
      <div><label>Username</label><input id="m-br-user" type="text" placeholder="username"></div>
      <div><label>Password</label><input id="m-br-pass" type="password" placeholder="password"></div>
    </div>` : ""}
    <div class="mrow">
      <div><label>Full Name</label><input id="m-br-name"  type="text"  value="${b.name  || ""}" placeholder="Full name"></div>
      <div><label>Email</label>    <input id="m-br-email" type="email" value="${b.email || ""}" placeholder="email@example.com"></div>
    </div>
    <div class="mrow">
      <div><label>Phone</label>        <input id="m-br-phone" type="text" value="${b.phone || ""}" placeholder="555-0101"></div>
      <div><label>Date of Birth</label><input id="m-br-dob"   type="date" value="${b.dob   || ""}"></div>
    </div>
    <div class="mrow">
      <div><label>PAN No</label><input id="m-br-pan" type="text" value="${b.pan_no || ""}" placeholder="ABCDE1234F"></div>
      <div><label>Branch</label><select id="m-br-branch">${branchOptions(b.branch_id)}</select></div>
    </div>
    <label>Address</label>
    <input id="m-br-addr" type="text" value="${b.address || ""}" placeholder="123 Main St, City">
  `;
}
function openAddBorrower()        { openModal("New Borrower",   borrowerForm({}, false), () => saveBorrower(null)); }
function openEditBorrower(id)     {
  const b = _borrowers.find(x => x.borrower_id == id);
  openModal("Edit Borrower", borrowerForm(b, true), () => saveBorrower(id));
}
async function saveBorrower(id) {
  const isEdit = id !== null;
  const body = {
    name:      document.getElementById("m-br-name").value.trim(),
    phone:     document.getElementById("m-br-phone").value.trim(),
    address:   document.getElementById("m-br-addr").value.trim(),
    email:     document.getElementById("m-br-email").value.trim(),
    dob:       document.getElementById("m-br-dob").value,
    pan_no:    document.getElementById("m-br-pan").value.trim(),
    branch_id: parseInt(document.getElementById("m-br-branch").value)
  };
  if (!isEdit) {
    body.username = document.getElementById("m-br-user").value.trim();
    body.password = document.getElementById("m-br-pass").value;
    if (!body.username || !body.password) { modalMsg("Username and password are required.", true); return; }
  }
  if (!body.name || !body.email) { modalMsg("Name and email are required.", true); return; }
  const res = await apiFetch(isEdit ? `/admin/borrowers/${id}` : "/admin/borrowers", {
    method: isEdit ? "PUT" : "POST", headers: authHeaders(), body: JSON.stringify(body)
  });
  if (res.ok) { closeModal(); loadBorrowers(); }
  else { modalMsg((await res.json()).detail || "Failed.", true); }
}
async function delBorrower(id) {
  if (!confirm("Delete this borrower and their login account?")) return;
  await apiFetch("/admin/borrowers/" + id, { method: "DELETE", headers: authHeaders() });
  loadBorrowers();
}

/* ── Staff ─────────────────────────────────────────── */
async function loadStaff() {
  if (!_branches.length) _branches = await (await apiFetch("/admin/branches")).json();
  _staff = await (await apiFetch("/admin/staff")).json();
  renderTable("staff-table", _staff, [
    { key: "name",        label: "Name" },
    { key: "username",    label: "Username" },
    { key: "branch_name", label: "Branch" },
    { label: "Actions", render: r => `
      <button class="btn btn-edit" onclick="openEditStaff('${r.staff_id}')">Edit</button>
      <button class="btn btn-red"  onclick="delStaff('${r.staff_id}')">Delete</button>
    `}
  ]);
}

function staffForm(s = {}, isEdit = false) {
  return `
    ${!isEdit ? `
    <div class="mrow">
      <div><label>Username</label><input id="m-st-user" type="text" placeholder="username"></div>
      <div><label>Password</label><input id="m-st-pass" type="password" placeholder="password"></div>
    </div>` : ""}
    <label>Full Name</label>
    <input id="m-st-name" type="text" value="${s.name || ""}" placeholder="Full name">
    <label>Branch</label>
    <select id="m-st-branch">${branchOptions(s.branch_id)}</select>
  `;
}
function openAddStaff()      { openModal("New Staff Member",  staffForm({}, false), () => saveStaff(null)); }
function openEditStaff(id)   {
  const s = _staff.find(x => x.staff_id == id);
  openModal("Edit Staff Member", staffForm(s, true), () => saveStaff(id));
}
async function saveStaff(id) {
  const isEdit = id !== null;
  const body = {
    name:      document.getElementById("m-st-name").value.trim(),
    branch_id: parseInt(document.getElementById("m-st-branch").value)
  };
  if (!isEdit) {
    body.username = document.getElementById("m-st-user").value.trim();
    body.password = document.getElementById("m-st-pass").value;
    if (!body.username || !body.password) { modalMsg("Username and password are required.", true); return; }
  }
  if (!body.name) { modalMsg("Name is required.", true); return; }
  const res = await apiFetch(isEdit ? `/admin/staff/${id}` : "/admin/staff", {
    method: isEdit ? "PUT" : "POST", headers: authHeaders(), body: JSON.stringify(body)
  });
  if (res.ok) { closeModal(); loadStaff(); }
  else { modalMsg((await res.json()).detail || "Failed.", true); }
}
async function delStaff(id) {
  if (!confirm("Delete this staff member?")) return;
  await apiFetch("/admin/staff/" + id, { method: "DELETE", headers: authHeaders() });
  loadStaff();
}

/* ── Admins ────────────────────────────────────────── */
async function loadAdmins() {
  _admins = await (await apiFetch("/admin/admins")).json();
  renderTable("admins-table", _admins, [
    { key: "name",     label: "Name" },
    { key: "username", label: "Username" },
    { label: "Actions", render: r => `
      <button class="btn btn-edit" onclick="openEditAdmin('${r.admin_id}')">Edit</button>
      <button class="btn btn-red"  onclick="delAdmin('${r.admin_id}')">Delete</button>
    `}
  ]);
}

function adminForm(a = {}, isEdit = false) {
  return `
    ${!isEdit ? `
    <div class="mrow">
      <div><label>Username</label><input id="m-ad-user" type="text" placeholder="username"></div>
      <div><label>Password</label><input id="m-ad-pass" type="password" placeholder="password"></div>
    </div>` : ""}
    <label>Full Name</label>
    <input id="m-ad-name" type="text" value="${a.name || ""}" placeholder="Full name">
  `;
}
function openAddAdmin()    { openModal("New Admin",   adminForm({}, false), () => saveAdmin(null)); }
function openEditAdmin(id) {
  const a = _admins.find(x => x.admin_id == id);
  openModal("Edit Admin", adminForm(a, true), () => saveAdmin(id));
}
async function saveAdmin(id) {
  const isEdit = id !== null;
  const body = { name: document.getElementById("m-ad-name").value.trim() };
  if (!isEdit) {
    body.username = document.getElementById("m-ad-user").value.trim();
    body.password = document.getElementById("m-ad-pass").value;
    if (!body.username || !body.password) { modalMsg("Username and password are required.", true); return; }
  }
  if (!body.name) { modalMsg("Name is required.", true); return; }
  const res = await apiFetch(isEdit ? `/admin/admins/${id}` : "/admin/admins", {
    method: isEdit ? "PUT" : "POST", headers: authHeaders(), body: JSON.stringify(body)
  });
  if (res.ok) { closeModal(); loadAdmins(); }
  else { modalMsg((await res.json()).detail || "Failed.", true); }
}
async function delAdmin(id) {
  if (!confirm("Delete this admin account?")) return;
  await apiFetch("/admin/admins/" + id, { method: "DELETE", headers: authHeaders() });
  loadAdmins();
}

/* ── Audit Log ─────────────────────────────────────── */
function auditActionBadge(action) {
  const map = { INSERT: "badge-active", UPDATE: "badge-pending", DELETE: "badge-rejected",
                APPROVE: "badge-completed", REJECT: "badge-rejected", REQUEST: "badge-pending" };
  return `<span class="badge ${map[(action||"").toUpperCase()] || "badge-completed"}">${action||""}</span>`;
}
async function loadAuditLog() {
  const data = await (await apiFetch("/admin/audit-logs")).json();
  renderTable("audit-table", data, [
    { key: "change_date", label: "Date" },
    { key: "changed_by",  label: "By" },
    { label: "Action",    render: r => auditActionBadge(r.action) },
    { key: "note",        label: "Details" }
  ]);
}

if (requireRole("admin")) {
  show("branches");
}
</script>
</body>
</html>
